version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hkh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hkh_db
      POSTGRES_USER: hkh_admin
      POSTGRES_PASSWORD: hkh_secret_2024
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hkh_admin -d hkh_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hkh_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hkh.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
